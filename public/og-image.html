<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #121212 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .logo {
            width: 200px;
            height: 200px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px rgba(175, 255, 0, 0.3);
        }
        .logo svg {
            width: 150px;
            height: 150px;
        }
        .text {
            color: white;
        }
        .title {
            font-size: 60px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -2px;
        }
        .title .highlight {
            color: #AFFF00;
        }
        .subtitle {
            font-size: 28px;
            color: #AFFF00;
            margin: 10px 0 0 0;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 609.58 431.02">
                <g>
                    <path fill="black" d="M303.7 301.28l76.33 -42.5 0 -80.13c-4.21,0.96 -17.89,9.89 -25.04,13.58l0 51.61 -42.33 23.87c-4.93,3.02 -8.83,4.42 -11.91,2.66l-41.73 -23.82 -20.88 13.26 65.56 41.46z"/>
                    <path fill="black" d="M229.82 249.27l25.04 -13.58 0 -48.89c11.44,-7.48 23.67,-13.27 35.6,-20.92l36.73 -23.89c-3.32,-2.43 -16.01,-10.76 -22.25,-12.22 -5.14,3.36 -9.85,5.88 -15.73,9.09l-47.66 26.79c-6.53,3.78 -12.23,4.36 -12.28,11.31l0.56 72.32z"/>
                    <path fill="black" d="M267.37 196.31c0,27.04 -1.66,35.62 0.77,40.04 1.93,3.5 5.87,4.72 15.79,10.11 12.43,6.75 16.9,10.11 20.99,10.23 5.43,0.15 11.16,-6 37.55,-19.64l0 -36.67c-5.56,2.87 -36.96,23.2 -41.72,24.45l1.67 -18.99 71.67 -41.59c3.49,-2.02 4.7,-4.25 4.56,-6.72l-1.4 -23.7 -104.4 56.96c-3.11,1.61 -5.48,1.47 -5.48,5.51z"/>
                </g>
            </svg>
        </div>
        <div class="text">
            <h1 class="title">Gitti<span class="highlight">om</span></h1>
            <p class="subtitle">Technology, Platforms & Innovation</p>
        </div>
    </div>
</body>
</html>
